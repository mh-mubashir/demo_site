<?xml version="1.0" encoding="UTF-8"?>
<!--
  Invoy Poster — 8.5 × 11 inches (816 × 1056 px at 96 dpi)
  Print at 100 % / actual size and paste onto the 20 × 28 board.
  Fonts: DM Serif Display, DM Sans
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 816 1056"
     width="816" height="1056">

  <!-- ── BACKGROUND ── -->
  <rect width="816" height="1056" fill="white"/>

  <!-- ── LOGO "invoy" — DM Serif Display 148 px, centered ── -->
  <text font-family="'DM Serif Display', Georgia, serif"
        font-size="148" text-anchor="middle" x="408" y="218">
    <tspan fill="#111111">in</tspan><tspan fill="#6C5CE7">voy</tspan>
  </text>

  <!-- ── PURPLE DIVIDER BAR ── -->
  <rect x="351" y="248" width="114" height="3"
        fill="#6C5CE7" rx="2"/>

  <!-- ── TAGLINE — DM Sans 300, 44 px, line-height 1.4 ── -->
  <text font-family="'DM Sans', Arial, sans-serif"
        font-size="44" font-weight="300" fill="#222222"
        text-anchor="middle" letter-spacing="-0.5">
    <tspan x="408" y="342">8–10 hours of your week</tspan>
    <tspan x="408" dy="60">swallowed by admin.</tspan>
    <tspan x="408" dy="60">
      <tspan font-weight="500" fill="#6C5CE7">Take them back.</tspan>
    </tspan>
  </text>

  <!-- ── QR BOX — 290 × 290 px, centered ── -->
  <rect x="263" y="510" width="290" height="290"
        fill="white" stroke="#111111" stroke-width="3" rx="12"/>
  <!-- Placeholder fill -->
  <rect x="276" y="523" width="264" height="264"
        fill="#f5f5f5" rx="5"/>
  <!-- Placeholder label -->
  <text font-family="'DM Sans', Arial, sans-serif"
        font-size="18" fill="#cccccc" text-anchor="middle"
        font-style="italic">
    <tspan x="408" y="651">Replace with</tspan>
    <tspan x="408" dy="26">QR Code</tspan>
  </text>

  <!-- ── "SCAN TO JOIN FREE" label ── -->
  <text font-family="'DM Sans', Arial, sans-serif"
        font-size="15" fill="#666666" font-weight="400"
        text-anchor="middle" x="408" y="840"
        letter-spacing="4">SCAN TO JOIN FREE</text>

  <!-- ── PILL ── -->
  <rect x="183" y="874" width="450" height="42"
        fill="#f0eeff" rx="21"/>
  <text font-family="'DM Sans', Arial, sans-serif"
        font-size="15" font-weight="500" fill="#4834d4"
        text-anchor="middle" x="408" y="900" letter-spacing="0.5">
    First 100 members  ·  Direct founding access
  </text>

</svg>
